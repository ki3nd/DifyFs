identity:
  name: "stat"
  author: "ki3nd"
  label:
    en_US: "Stat File"
    zh_Hans: "Stat File"
description:
  human:
    en_US: "Show detailed metadata for a document at a virtual path in the Dify dataset filesystem."
    zh_Hans: "Show detailed metadata for a document at a virtual path."
  llm: "Show file metadata for a document at the given virtual path (slug). Returns name, slug, word count, token count, indexing status, creation time, and all custom metadata."
parameters:
  - name: dataset_id
    type: string
    required: true
    label:
      en_US: "Dataset ID"
    human_description:
      en_US: "The ID of the Dify dataset"
    llm_description: "The Dify dataset ID"
    form: llm
  - name: path
    type: string
    required: true
    label:
      en_US: "Path"
    human_description:
      en_US: "Virtual file path (slug), e.g. guides/quickstart"
    llm_description: "Virtual file path matching the document's slug, e.g. 'guides/quickstart'"
    form: llm
  - name: groups
    type: string
    required: false
    label:
      en_US: "Groups"
    human_description:
      en_US: "Comma-separated group names the caller belongs to, e.g. eng,legal. When omitted, only public documents are shown."
    llm_description: "Caller's group memberships as a comma-separated string, e.g. 'eng,legal'. Omit to stat only public documents."
    form: llm
extra:
  python:
    source: tools/stat.py
